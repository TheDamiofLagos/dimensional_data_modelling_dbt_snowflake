name: algora_sales

profile: algora_sales

flags:
  partial_parse: true

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

snapshots:
  algora_sales:
    +target_schema: snapshots
    +strategy: check
    +check_cols: all

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_seeds'
  algora_sales:
    +schema: seeds

models:
  algora_sales:
    # Materialize staging models as views, and marts as tables
    base:
      +materialized: view
      +schema: base
    prep:
      +materialized: table
      +schema: prep
    dimensional:
      +materialized: table
      +schema: dimensional
    present:
      +materialized: table
      +schema: present
