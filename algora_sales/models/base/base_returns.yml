models:
  - name: base_returns
    description: "Base model for order returns"
    columns:
      - name: return_id
        description: "Primary key for returns"
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: "Foreign key to base_orders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('base_orders')
                field: order_id
      - name: product_id
        description: "Foreign key to base_product"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('base_product')
                field: product_id
      - name: return_date
        description: "Date the return was initiated"
        data_tests:
          - not_null
      - name: reason
        description: "Reason for the return"
        data_tests:
          - not_null
      - name: amount_refunded
        description: "Amount refunded to the customer"
        data_tests:
          - not_null
