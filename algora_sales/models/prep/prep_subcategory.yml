models:
  - name: prep_subcategory
    description: "Cleaned subcategory records with category foreign key"
    columns:
      - name: subcategory_id
        description: "Primary key for subcategories"
        data_tests:
          - not_null
          - unique
      - name: subcategory_name
        description: "Subcategory name"
        data_tests:
          - not_null
      - name: category_id
        description: "Foreign key to prep_category"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('prep_category')
                field: category_id
