models:
  - name: prep_product
    description: "Cleaned product records with subcategory foreign key"
    columns:
      - name: product_id
        description: "Primary key for products"
        data_tests:
          - not_null
          - unique
      - name: name
        description: "Product name"
        data_tests:
          - not_null
      - name: price
        description: "Product price"
        data_tests:
          - not_null
      - name: description
        description: "Product description"
      - name: subcategory_id
        description: "Foreign key to prep_subcategory"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('prep_subcategory')
                field: subcategory_id
