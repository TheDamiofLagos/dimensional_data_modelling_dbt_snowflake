models:
  - name: prep_payment_method
    description: "Cleaned payment method reference data"
    columns:
      - name: payment_method_id
        description: "Primary key for payment methods"
        data_tests:
          - not_null
          - unique
      - name: payment_method
        description: "Payment method name"
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['cash', 'credit card', 'debit card', 'net banking', 'upi']
